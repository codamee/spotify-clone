<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="left">
            <div class="logo">
                <img src="assets/logo.svg" alt="logo">
            </div>
            <div class="home-icon">
                <img src="assets/home.svg" alt="home">
            </div>
            <div class="search">
                <input type="search" placeholder="What do you want to play">
            </div>
        </div>
        <div class="right">
            <div class="bold-words">
                <span>Premium</span>
                <span>Support</span>
                <span>Download</span>
            </div>
            <div class="line">|</div>
            <div class="install">Install App</div>
            <div class="sign-up">Sign up</div>
            <div class="log-in">Log In</div>
        </div>
    </nav>
    <div class="sidebar">
        <div class="title">
            <p>Your Library</p>
            <button>Play all</button>
        </div>
        <div class="songs-list">
            <div>
                <p>song -1 :author </p>
                <div class="play-btn">Play</div>
            </div>
        </div>
        <div class="policies">
            <p>Legal</p>
            <p>Privacy & Policy</p>
            <p>Safety & Privacy Center</p>
            <p>Cookies</p>
            <p>About ads</p>
            <p>Privacy center</p>
        </div>
        <div>English</div>
    </div>
    <main>
        <p>Trending songs</p>
        <div class="cards">
            <div class="card">
                <img src="assets/ab67616d00001e02cdce9a38222807fa703b4396.jpg" alt="banner">
                <div class="song-info">sai abyankar,sruti hasan</div>
                <div class="song-name">Phavadha Malli - From think India</div>
                <div class="play-btn">▶️</div>
            </div>
    </main>
</body>

</html>
