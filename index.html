<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple music player">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="left">
            <div class="logo">
                <img src="assets/logo.svg" alt="logo">
            </div>
            <div class="home-icon">
                <img src="assets/home.svg" alt="home">
            </div>
            <div class="search">
                <input type="search" placeholder="What do you want to play">
            </div>
        </div>
        <div class="right">
            <div class="bold-words">
                <span>Premium</span>
                <span>Support</span>
                <span>Download</span>
            </div>
            <div class="line">|</div>
            <div class="install">Install App</div>
            <div class="sign-up">Sign up</div>
            <div class="log-in">Log In</div>
        </div>
    </nav>
    <div class="sidebar">
        <div class="title"> 
            <p>Your Library</p>
            <!-- <button>Play all</button> -->
        </div>
        <div class="songs-list">
        </div>
        <div class="policies">
            <p>Legal</p>
            <p>Privacy & Policy</p>
            <p>Safety & Privacy Center</p>
            <p>Cookies</p>
            <p>About ads</p>
            <p>Privacy center</p>
        </div>
        <div>English</div>
    </div>
    <main>
        <p>Trending songs</p>
        <div class="cards">
            <div class="player">
                <div class="controls">
                    <div class="name">Last in the city - lofi girl</div>
                    <div class="control-btns">
                        <img id="previous" src="assets/previous.svg" alt="previous">
                        <img id="play" src="assets/play.svg" alt="pause">
                        <img id="next" src="assets/next.svg" alt="next">
                    </div>
                    
                    <div class="sound">
                        <div class="time">00:00 / 00:00  </div>
                        <img src="assets/no-volume.svg" alt="no-volume">
                        <input type="range" name="volume" id="volume" mi>
                        <img src="assets/full-volume.svg" alt="full-volume">
                    </div>
                </div>
                <div class="scroll">
                    <div class="circle"></div>

                </div>
            </div>
        </div>
    </main>
    <script src="script.js" type="module"></script>
</body>

</html>
