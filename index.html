<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify – Web Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="left">
            <div class="logo">🚀</div>
            <div class="home-icon">🛖</div>
            <div class="search">
                <input type="search" placeholder="What do you want to play">
            </div>
        </div>
        <div class="right">
            <div class="bold-words">
                <span>Premium</span>
                <span>Support</span>
                <span>Download</span>
            </div>
            <div class="line">|</div>
            <div class="install">Install App</div>
            <div class="sign-up">Sign up</div>
            <div class="log-in">Log In</div>
        </div>
    </nav>
    <div class="sidebar">
        <div class="title">
            <p>Your Library</p>
            <button>Play all</button>
        </div>
        <div class="songs-list">
            <div>
                <p>song -1 :author </p>
                <div class="play-btn">Play</div>
            </div>
        </div>
        <div class="policies">
            <p>Legal</p>
            <p>Privacy & Policy</p>
            <p>Safety & Privacy Center</p>
            <p>Cookies</p>
            <p>About ads</p>
            <p>Privacy center</p>
        </div>
        <div>English</div>
    </div>
    <main>i am main</main>
</body>

</html>
