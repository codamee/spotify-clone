<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="left">
            <div class="logo">
                <img src="assets/logo.svg" alt="logo">
            </div>
            <div class="home-icon">
                <img src="assets/home.svg" alt="home">
            </div>
            <div class="search">
                <input type="search" placeholder="What do you want to play">
            </div>
        </div>
        <div class="right">
            <div class="bold-words">
                <span>Premium</span>
                <span>Support</span>
                <span>Download</span>
            </div>
            <div class="line">|</div>
            <div class="install">Install App</div>
            <div class="sign-up">Sign up</div>
            <div class="log-in">Log In</div>
        </div>
    </nav>
    <div class="sidebar">
        <div class="title"> 
            <p>Your Library</p>
            <button>Play all</button>
        </div>
        <div class="songs-list">
        </div>
        <div class="policies">
            <p>Legal</p>
            <p>Privacy & Policy</p>
            <p>Safety & Privacy Center</p>
            <p>Cookies</p>
            <p>About ads</p>
            <p>Privacy center</p>
        </div>
        <div>English</div>
    </div>
    <main>
        <p>Trending songs</p>
        <div class="cards">
            <div class="card">
                <img src="assets/ab67616d00001e02cdce9a38222807fa703b4396.jpg" alt="banner">
                <div class="song-info">sai abyankar,sruti hasan</div>
                <div class="song-name">Phavadha Malli - From think India</div>
                <div class="play-btn">▶️</div>
            </div>
            <div class="player">
                <div class="controls">
                    <div class="name">prada - guru randhawa</div>
                    <div class="control-btns">
                        <img src="assets/previous.svg" alt="previous">
                        <img src="assets/pause.svg" alt="pause">
                        <img src="assets/next.svg" alt="">
                    </div>
                    <div class="sound">
                        <img src="assets/no-volume.svg" alt="no-volume">
                        <input type="range" name="volume" id="volume" mi>
                        <img src="assets/full-volume.svg" alt="full-volume">
                    </div>
                </div>
                <div class="scroll">

                </div>
            </div>
        </div>
    </main>
    <script src="script.js" type="module"></script>
</body>

</html>
